<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e9a665">
<title>PugLife v2.0.0</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--ink:#35271f;--panel:#fffaf0;--brown:#50392f;--orange:#e69a5e;--cream:#fff7e8;--green:#7db58a}
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink)}
body{background:linear-gradient(145deg,#f4d6ae,#edc5aa 50%,#b9d7ca);padding:14px}
button,input,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{max-width:900px;margin:auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
h1{margin:0;font-size:clamp(36px,8vw,62px);letter-spacing:-.05em}
.version{font-size:12px;font-weight:700;opacity:.65}
.panel{background:#fffdf5e8;border:1px solid #fff;border-radius:28px;padding:18px;box-shadow:0 22px 60px #65452f2b}
.start-card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 24px #6845291c}
.primary,.secondary{border:0;border-radius:14px;padding:12px 16px;font-weight:800}
.primary{background:var(--brown);color:#fff}
.secondary{background:#f0e2d4;color:#4a362d}
.full{width:100%}
label{display:block;font-size:12px;font-weight:800;margin:10px 0 5px}
input,select{width:100%;border:2px solid transparent;border-radius:13px;padding:12px;background:#fff}
.machine{background:linear-gradient(145deg,#f2b46f,#d98958);border:5px solid #fff7e9;border-radius:36px;padding:16px;box-shadow:0 25px 70px #65472c30}
.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.topbuttons{display:flex;gap:8px}
.small{border:0;border-radius:12px;padding:8px 11px;background:#fff9;font-weight:800}
.screen{position:relative;height:min(52vh,440px);min-height:360px;overflow:hidden;border:8px solid #5d493f;border-radius:24px;background:#e5d1b8}
.room-bg{position:absolute;inset:0}
.room-bg svg{width:100%;height:100%}
.bubble{position:absolute;left:16px;top:14px;z-index:5;background:#fffaf0;padding:10px 13px;border-radius:16px 16px 16px 4px;font-weight:800;max-width:68%;box-shadow:0 8px 20px #0002}
.stage{position:absolute;left:50%;bottom:22px;width:330px;height:280px;transform:translateX(-50%)}
#pug{position:absolute;inset:0;transform-origin:50% 88%}
#pug.breathe{animation:breathe 2.2s ease-in-out infinite}
#pug.jump{animation:jump .5s ease 4}
#pug.walk{animation:walk 1.8s ease 1}
#pug.sleep{animation:sleep 2.4s ease 1}
#pug.shake{animation:shake .16s linear 10}
#pug.pet{animation:pet .5s ease 3}
#pug.eat{animation:eat .3s ease 6}
@keyframes breathe{50%{transform:translateY(4px) scaleY(.985)}}
@keyframes jump{50%{transform:translateY(-34px) rotate(-5deg)}}
@keyframes walk{0%{transform:translateX(-90px)}50%{transform:translateX(0) translateY(-6px)}100%{transform:translateX(90px)}}
@keyframes sleep{to{transform:translateY(12px) rotate(-7deg) scaleY(.95)}}
@keyframes shake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes pet{50%{transform:rotate(-4deg) scale(1.04)}}
@keyframes eat{50%{transform:translateY(8px)}}
.info{display:flex;justify-content:space-between;gap:8px;margin:12px 0}
.pill{background:#fff9;padding:8px 11px;border-radius:999px;font-weight:800}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:#fff9;border-radius:14px;padding:8px}
.stathead{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:5px}
.track{height:9px;border-radius:99px;background:#ddcfbd;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#e88b75,#79b390);transition:width .3s}
.tabs{display:flex;gap:7px;overflow:auto;margin-top:13px;padding-bottom:2px}
.tab{border:0;border-radius:999px;padding:9px 13px;background:#f3dfca;font-weight:800;white-space:nowrap}
.tab.active{background:var(--brown);color:#fff}
.pane{display:none;margin-top:10px}
.pane.active{display:block}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.action,.item{border:0;border-radius:16px;background:#fff;padding:12px;font-weight:800;box-shadow:0 7px 17px #6b45261d}
.action{min-height:72px;display:grid;place-items:center;gap:4px}
.action span{font-size:24px}
.item small{display:block;opacity:.65;margin-top:3px}
.modal{position:fixed;inset:0;background:#241a16aa;display:grid;place-items:center;padding:16px;z-index:20}
.modal-card{width:min(520px,100%);background:#fffaf0;border-radius:24px;padding:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap}
.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,25px);opacity:0;background:#2f2723;color:#fff;padding:11px 16px;border-radius:999px;font-weight:800;transition:.25s;z-index:30}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,1fr)}.screen{height:410px}}
</style>
</head>
<body>
<div class="app">
<header>
  <div><h1>PugLife</h1><div class="version">Version 2.0.0</div></div>
</header>

<section id="startScreen" class="panel">
  <div id="startContent"></div>
</section>

<section id="gameScreen" class="machine hidden">
  <div class="topline">
    <b>PUGLIFE</b>
    <div class="topbuttons">
      <button id="settingsBtn" class="small">Einstellungen</button>
      <button id="homeBtn" class="small">Hauptmenü</button>
    </div>
  </div>

  <div class="screen">
    <div id="roomBg" class="room-bg"></div>
    <div id="bubble" class="bubble">Hallo!</div>
    <div class="stage">
      <div id="pug" class="breathe">
        <svg viewBox="0 0 330 280" aria-label="Mops">
          <defs>
            <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e2c18e"/><stop offset="1" stop-color="#ad8055"/></linearGradient>
          </defs>
          <ellipse cx="165" cy="260" rx="92" ry="18" fill="#4d382d35"/>
          <path d="M245 180 C292 150 300 207 265 211 C247 213 247 193 260 190" fill="none" stroke="#a97a50" stroke-width="17" stroke-linecap="round"/>
          <ellipse cx="165" cy="202" rx="88" ry="64" fill="url(#fur)"/>
          <ellipse cx="112" cy="240" rx="29" ry="39" fill="#b98d61"/><ellipse cx="218" cy="240" rx="29" ry="39" fill="#b98d61"/>
          <path d="M77 106 C43 72 45 38 91 57 L112 94Z" fill="#4c3933"/><path d="M253 106 C287 72 285 38 239 57 L218 94Z" fill="#4c3933"/>
          <ellipse cx="165" cy="125" rx="101" ry="91" fill="url(#fur)"/>
          <path d="M111 64 Q165 37 219 64 Q207 94 165 98 Q123 94 111 64Z" fill="#75574755"/>
          <ellipse cx="119" cy="115" rx="31" ry="36" fill="#47342f"/><ellipse cx="211" cy="115" rx="31" ry="36" fill="#47342f"/>
          <ellipse cx="121" cy="116" rx="20" ry="25" fill="#141111"/><ellipse cx="209" cy="116" rx="20" ry="25" fill="#141111"/>
          <circle cx="112" cy="105" r="7" fill="#fff"/><circle cx="200" cy="105" r="7" fill="#fff"/>
          <ellipse cx="165" cy="174" rx="64" ry="53" fill="#4c3934"/>
          <path d="M139 153 Q165 139 191 153 Q188 173 165 176 Q142 173 139 153Z" fill="#1c1716"/>
          <path d="M165 176 V188" stroke="#171313" stroke-width="5"/>
          <path d="M165 188 Q145 204 129 190 M165 188 Q185 204 201 190" fill="none" stroke="#171313" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="info">
    <div class="pill"><span id="petName">Mops</span> · Tag <span id="day">1</span></div>
    <div class="pill"><span id="phase">Welpe</span> · <span id="clock">08:00</span></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stathead"><span>Sättigung</span><b id="hungerN">80</b></div><div class="track"><div id="hunger" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Liebe</span><b id="loveN">80</b></div><div class="track"><div id="love" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Spaß</span><b id="funN">80</b></div><div class="track"><div id="fun" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Energie</span><b id="energyN">80</b></div><div class="track"><div id="energy" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Sauberkeit</span><b id="cleanN">80</b></div><div class="track"><div id="clean" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Gesundheit</span><b id="healthN">100</b></div><div class="track"><div id="health" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Bewegung</span><b id="exerciseN">70</b></div><div class="track"><div id="exercise" class="fill"></div></div></div>
    <div class="stat"><div class="stathead"><span>Münzen</span><b id="coinsN">25</b></div><div class="track"><div id="coinsBar" class="fill"></div></div></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="care">Pflege</button>
    <button class="tab" data-tab="food">Futter</button>
    <button class="tab" data-tab="games">Minispiele</button>
    <button class="tab" data-tab="inventory">Inventar</button>
    <button class="tab" data-tab="shop">Laden</button>
  </div>

  <div id="pane-care" class="pane active">
    <div class="grid">
      <button class="action" data-action="pet"><span>🤲</span>Streicheln</button>
      <button class="action" data-action="play"><span>🎾</span>Spielen</button>
      <button class="action" data-action="walk"><span>🚶</span>Gassi</button>
      <button class="action" data-action="sleep"><span>🌙</span>Schlafen</button>
      <button class="action" data-action="wash"><span>🫧</span>Waschen</button>
    </div>
  </div>

  <div id="pane-food" class="pane"><div id="foodGrid" class="grid"></div></div>
  <div id="pane-games" class="pane">
    <div class="grid">
      <button class="item" id="reactionGame"><b>Reaktion</b><small>Schnell tippen und Münzen gewinnen.</small></button>
      <button class="item" id="memoryGame"><b>Memory</b><small>Vier Paare aufdecken.</small></button>
    </div>
  </div>
  <div id="pane-inventory" class="pane"><div id="inventoryGrid" class="grid"></div></div>
  <div id="pane-shop" class="pane"><div id="shopGrid" class="grid"></div></div>
</section>
</div>

<div id="createModal" class="modal hidden">
  <div class="modal-card">
    <h2>Neues Spiel</h2>
    <label>Name des Mopses</label>
    <input id="newName" maxlength="16" placeholder="z. B. Bruno">
    <label>Länge eines Spieltags</label>
    <select id="cycle">
      <option value="5">5 Minuten</option><option value="10">10 Minuten</option><option value="15">15 Minuten</option><option value="30" selected>30 Minuten</option><option value="60">1 Stunde</option>
    </select>
    <div class="modal-actions"><button id="cancelCreate" class="secondary">Abbrechen</button><button id="confirmCreate" class="primary">Erstellen</button></div>
  </div>
</div>

<div id="settingsModal" class="modal hidden">
  <div class="modal-card">
    <h2>Einstellungen</h2>
    <label>Länge eines Spieltags</label>
    <select id="settingsCycle">
      <option value="5">5 Minuten</option><option value="10">10 Minuten</option><option value="15">15 Minuten</option><option value="30">30 Minuten</option><option value="60">1 Stunde</option>
    </select>
    <div class="modal-actions" style="justify-content:space-between">
      <button id="deleteSave" class="secondary">Spielstand löschen</button>
      <div><button id="closeSettings" class="secondary">Schließen</button> <button id="saveSettings" class="primary">Speichern</button></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
(()=>{
"use strict";
const VERSION="2.0.0";
const SAVE_KEY="puglife-save-v2";
let state=null;
let timer=null;
let toastTimer=null;

const $=id=>document.getElementById(id);
const clamp=v=>Math.max(0,Math.min(100,Number(v)));

function defaultState(name,cycle){
 return {
  name,cycle:Number(cycle)||30,day:1,gameMinutes:480,lastReal:Date.now(),
  hunger:82,love:78,fun:72,energy:86,clean:92,health:100,exercise:65,coins:25,
  inventory:{kibble:3,chicken:1,carrot:1,treat:2,soap:1,medicine:0}
 }
}
function save(){
 if(!state)return;
 state.lastReal=Date.now();
 localStorage.setItem(SAVE_KEY,JSON.stringify(state))
}
function load(){
 const raw=localStorage.getItem(SAVE_KEY);
 if(!raw)return null;
 try{return Object.assign(defaultState("Mops",30),JSON.parse(raw))}
 catch(e){console.error(e);return null}
}
function toast(text){
 clearTimeout(toastTimer);$("toast").textContent=text;$("toast").classList.add("show");
 toastTimer=setTimeout(()=>$("toast").classList.remove("show"),1600)
}
function phase(){return state.day<4?"Welpe":state.day<10?"Junghund":state.day<25?"Erwachsener":"Senior"}
function clockText(){
 const m=Math.floor(state.gameMinutes)%1440;
 return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")
}
function roomSvg(){
 return `<svg viewBox="0 0 800 460" preserveAspectRatio="none">
 <rect width="800" height="310" fill="#e6d2b8"/><rect y="310" width="800" height="150" fill="#c8a77f"/>
 <rect x="0" y="300" width="800" height="14" fill="#a98464"/>
 <rect x="500" y="180" width="210" height="105" rx="24" fill="#a97868"/>
 <rect x="520" y="150" width="170" height="70" rx="22" fill="#bd8a79"/>
 <rect x="120" y="86" width="170" height="132" rx="14" fill="#f7ecdc" stroke="#9a7966" stroke-width="10"/>
 <rect x="143" y="109" width="124" height="86" fill="#96c7da"/>
 <ellipse cx="310" cy="395" rx="190" ry="44" fill="#c77f67" opacity=".5"/></svg>`
}
function renderStart(){
 const s=load();const box=$("startContent");
 if(!s){
  box.innerHTML=`<div class="start-card"><h2>Noch kein Spielstand</h2><p>Erstelle deinen Mops und beginne ein neues Spiel.</p><button id="newGameBtn" class="primary full">Neues Spiel beginnen</button></div>`;
  $("newGameBtn").onclick=()=>{$("createModal").classList.remove("hidden")}
 }else{
  box.innerHTML=`<div class="start-card"><h2>${escapeHtml(s.name)}</h2><p>Tag ${s.day} · ${phaseFrom(s)}</p><button id="continueBtn" class="primary full">Spiel fortsetzen</button></div>`;
  $("continueBtn").onclick=openGame
 }
}
function phaseFrom(s){return s.day<4?"Welpe":s.day<10?"Junghund":s.day<25?"Erwachsener":"Senior"}
function escapeHtml(t){return String(t).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function render(){
 if(!state)return;
 $("roomBg").innerHTML=roomSvg();
 $("petName").textContent=state.name;$("day").textContent=state.day;$("phase").textContent=phase();$("clock").textContent=clockText();
 ["hunger","love","fun","energy","clean","health","exercise"].forEach(k=>{
  $(k).style.width=clamp(state[k])+"%";$(k+"N").textContent=Math.round(state[k])
 });
 $("coinsN").textContent=state.coins;$("coinsBar").style.width=Math.min(100,state.coins)+"%";
 renderFood();renderInventory();renderShop()
}
function renderFood(){
 const foods={kibble:["Trockenfutter",22],chicken:["Hühnchen",30],carrot:["Karotte",12],treat:["Leckerli",9]};
 $("foodGrid").innerHTML="";
 Object.entries(foods).forEach(([id,[name,val]])=>{
  const b=document.createElement("button");b.className="item";b.disabled=!state.inventory[id];
  b.innerHTML=`<b>${name}</b><small>${state.inventory[id]} Stück · Sättigung +${val}</small>`;
  b.onclick=()=>{state.inventory[id]--;state.hunger=clamp(state.hunger+val);say(state.name+" frisst "+name+".");animate("eat",1800);save();render()};
  $("foodGrid").appendChild(b)
 })
}
function renderInventory(){
 $("inventoryGrid").innerHTML="";
 Object.entries(state.inventory).forEach(([id,n])=>{
  if(!n)return;const b=document.createElement("div");b.className="item";b.innerHTML=`<b>${id}</b><small>${n} Stück</small>`;$("inventoryGrid").appendChild(b)
 })
}
function renderShop(){
 const goods={kibble:["Trockenfutter",4],chicken:["Hühnchen",7],carrot:["Karotte",3],treat:["Leckerli",2],soap:["Shampoo",8],medicine:["Medizin",15]};
 $("shopGrid").innerHTML="";
 Object.entries(goods).forEach(([id,[name,cost]])=>{
  const b=document.createElement("button");b.className="item";b.disabled=state.coins<cost;
  b.innerHTML=`<b>${name}</b><small>${cost} Münzen</small>`;
  b.onclick=()=>{if(state.coins<cost)return;state.coins-=cost;state.inventory[id]=(state.inventory[id]||0)+1;save();render();toast(name+" gekauft")};
  $("shopGrid").appendChild(b)
 })
}
function say(text){$("bubble").textContent=text}
function animate(cls,ms){
 const pug=$("pug");pug.className=cls;
 setTimeout(()=>{pug.className="breathe"},ms)
}
function action(type){
 if(type==="pet"){state.love=clamp(state.love+20);say("Das gefällt "+state.name+".");animate("pet",1500)}
 if(type==="play"){state.fun=clamp(state.fun+24);state.energy=clamp(state.energy-10);say(state.name+" spielt begeistert.");animate("jump",2000)}
 if(type==="walk"){state.exercise=clamp(state.exercise+28);state.energy=clamp(state.energy-14);state.hunger=clamp(state.hunger-7);say(state.name+" geht Gassi.");animate("walk",1800)}
 if(type==="sleep"){state.energy=clamp(state.energy+35);state.hunger=clamp(state.hunger-6);say(state.name+" schläft.");animate("sleep",2400)}
 if(type==="wash"){state.clean=clamp(state.clean+38);say(state.name+" ist wieder sauber.");animate("shake",1800)}
 save();render()
}
function showTab(name){
 document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
 document.querySelectorAll(".pane").forEach(p=>p.classList.toggle("active",p.id==="pane-"+name))
}
function tick(){
 if(!state)return;
 const seconds=5;
 const cycleSeconds=Math.max(300,state.cycle*60);
 state.gameMinutes+=(seconds/cycleSeconds)*1440;
 while(state.gameMinutes>=1440){state.gameMinutes-=1440;state.day++}
 state.hunger=clamp(state.hunger-0.6);
 state.love=clamp(state.love-0.2);
 state.fun=clamp(state.fun-0.35);
 state.energy=clamp(state.energy-0.3);
 state.clean=clamp(state.clean-0.25);
 state.exercise=clamp(state.exercise-0.2);
 render();save()
}
function startTimer(){stopTimer();timer=setInterval(tick,5000)}
function stopTimer(){if(timer){clearInterval(timer);timer=null}}
function openGame(){
 state=load();if(!state)return;
 $("startScreen").classList.add("hidden");$("gameScreen").classList.remove("hidden");
 showTab("care");render();startTimer()
}
function goHome(){
 save();stopTimer();state=null;$("gameScreen").classList.add("hidden");$("startScreen").classList.remove("hidden");renderStart()
}

$("tabs").addEventListener("click",e=>{const b=e.target.closest(".tab");if(b)showTab(b.dataset.tab)});
document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>action(b.dataset.action));
$("confirmCreate").onclick=()=>{
 const name=$("newName").value.trim();
 if(!name){toast("Bitte einen Namen eingeben");return}
 state=defaultState(name,$("cycle").value);save();$("createModal").classList.add("hidden");openGame()
};
$("cancelCreate").onclick=()=>$("createModal").classList.add("hidden");
$("homeBtn").onclick=goHome;
$("settingsBtn").onclick=()=>{$("settingsCycle").value=state.cycle;$("settingsModal").classList.remove("hidden")};
$("closeSettings").onclick=()=>$("settingsModal").classList.add("hidden");
$("saveSettings").onclick=()=>{state.cycle=Number($("settingsCycle").value);save();$("settingsModal").classList.add("hidden");toast("Gespeichert")};
$("deleteSave").onclick=()=>{
 if(!confirm("Spielstand wirklich löschen?"))return;
 stopTimer();localStorage.removeItem(SAVE_KEY);state=null;$("settingsModal").classList.add("hidden");$("gameScreen").classList.add("hidden");$("startScreen").classList.remove("hidden");renderStart();toast("Spielstand gelöscht")
};
$("reactionGame").onclick=()=>{state.coins+=3;state.fun=clamp(state.fun+5);save();render();toast("+3 Münzen")};
$("memoryGame").onclick=()=>{state.coins+=5;state.fun=clamp(state.fun+7);save();render();toast("+5 Münzen")};
document.addEventListener("visibilitychange",()=>{if(document.hidden){save()}else if(state){render();startTimer()}});
window.addEventListener("pagehide",save);
renderStart()
})();
</script>
</body>
</html>
